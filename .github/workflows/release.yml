name: Release

on:
  workflow_call:
    inputs:
      github-release:
        required: false
        type: boolean
        default: true
      publish:
        required: false
        type: boolean
        default: false
      build:
        required: false
        type: string
        default: ""
      tag:
        required: false
        type: string
        default: ""
      bun-version:
        required: false
        type: string
        default: latest
      changelog:
        required: false
        type: string
        default: bunx --bun changelogithub
      publish-command:
        required: false
        type: string
        default: bun publish --access public

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Setup Bun
        uses: devjskit/github-workflows/setup-bun@v1
        with:
          bun-version: ${{ inputs.bun-version }}
          fetch-all: true

      - name: Generate GitHub Changelog
        run: ${{ inputs.changelog }}
        continue-on-error: true
        if: ${{ inputs.github-release && inputs.changelog != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: ${{ inputs.build }}
        if: ${{ inputs.build != '' && inputs.publish }}

      - name: Publish to NPM
        run: ${{ inputs['publish-command'] }} ${{ inputs['tag'] && format('--tag {0}', inputs['tag']) || '' }}
        if: ${{ inputs.publish }}
