name: autofix.ci

on:
  push:
    branches: [ master, next ]

  pull_request:

  workflow_call:
    inputs:
      command:
        required: false
        type: string
        default: bun run lint --fix
      os:
        required: false
        type: string
        default: ubuntu-slim
      bun-version:
        required: false
        type: string
        default: latest

jobs:
  autofix:
    runs-on: ${{ inputs.os || 'ubuntu-slim' }}
    permissions:
      contents: read

    steps:
      - name: Setup Bun
        uses: devjskit/github-workflows/setup-bun@v1
        with:
          bun-version: ${{ inputs.bun-version }}
          no-frozen-lockfile: true

      - name: Fix
        run: ${{ inputs.command }}
        if: ${{ inputs.command != '' }}

      - name: Commit
        uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8 # v2.3.3
