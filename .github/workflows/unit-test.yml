name: Unit Test

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-latest

      os-matrix:
        required: false
        type: string
        default: "\"ubuntu-latest\", \"windows-latest\""

      bun-version:
        required: false
        type: string
        default: latest

      typecheck:
        required: false
        type: string
        default: bun run typecheck

      lint:
        required: false
        type: string
        default: bun run lint

      build:
        required: false
        type: string
        default: bun run build

      test:
        required: false
        type: string
        default: bun run test

      skip-lint:
        required: false
        type: boolean
        default: false

      skip-test:
        required: false
        type: boolean
        default: false

      build-for-lint:
        required: false
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ${{ inputs.primary-os }}
    if: ${{ !inputs.skip-lint }}
    steps:
      - name: Setup Bun
        uses: devjskit/github-workflows/setup-bun@v1
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Build
        run: ${{ inputs.build }}
        if: ${{ inputs.build-for-lint && inputs.build != '' }}

      - name: Type Check
        run: ${{ inputs.typecheck }}
        if: ${{ inputs.typecheck != '' }}

      - name: Lint
        run: ${{ inputs.lint }}
        if: ${{ inputs.lint != '' }}

  test:
    strategy:
      matrix:
        os: ${{ fromJson(format('[{0}]', inputs.os-matrix)) }}
      fail-fast: false

    if: ${{ !inputs.skip-test }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Bun
        uses: devjskit/github-workflows/setup-bun@v1
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Build
        run: ${{ inputs.build }}
        if: ${{ inputs.build != '' }}

      - name: Unit Test
        run: ${{ inputs.test }}
        if: ${{ inputs.test != '' }}
